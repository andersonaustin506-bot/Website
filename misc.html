<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/opendyslexic@0.0.1/index.min.css" rel="stylesheet">
<!-- CSS starts here keep this in mind youll have to edit it later!!! -->
    <style>
    body { font-family: 'Poppins', sans-serif; margin: 0; font-size: 16px; line-height: 1.5; }
    body.dyslexic, body.dyslexic * { font-family: 'OpenDyslexic', 'Comic Sans MS', sans-serif !important; }
    header {
        background-color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 20px;
        position: relative;
    }
    header .logo {
        width: 150px;
    }
    header .text-logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 40px;
    }
    header a {
        color: black;
        text-decoration: none;
        font-size: 20px;
    }
    .header-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    .cart-icon {
        height: 32px;
        width: auto;
        cursor: pointer;
    }
    .products {
        display: flex;
        flex-wrap: wrap;
        text-align: center;
        padding: 20px;
    }
    .product {
        width: 33%;
        padding: 15px;
        box-sizing: border-box;
    }
    .product img {
        width: 60%;
        height: auto;
    }
    .product button {
        background-color: #e0e0e0;
        border: none;
        padding: 10px 20px;
        font-family: 'Poppins', sans-serif;
        font-size: 16px;
        cursor: pointer;
    }
    footer {
        background-color: #e0e0e0;
        text-align: center;
        padding: 10px;
    }
    .partners {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 30px;
        padding: 0;
    }
    .partners img {
        height: 40px;
    }

    /* acs tab start */
    .access-tab {
        position: fixed;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        background-color: #444;
        color: white;
        padding: 12px 8px;
        cursor: pointer;
        writing-mode: vertical-rl;
        border-radius: 0 6px 6px 0;
        font-size: 14px;
        z-index: 1000;
    }
    .access-panel {
        position: fixed;
        left: -260px;
        top: 50%;
        transform: translateY(-50%);
        width: 240px;
        background-color: white;
        border: 2px solid #444;
        padding: 20px;
        transition: left 0.3s;
        z-index: 999;
        border-radius: 0 6px 6px 0;
        text-align: center;
    }
    .access-panel.open {
        left: 40px;
    }
    .access-panel h3 {
        margin-top: 0;
    }
    .access-panel label {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        cursor: pointer;
    }
    /* acs tab end */
</style>
<!-- CSS ends here -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Goals - Dog Accessories</title>
</head>
<body>

    <!-- acs tab start -->
    <div class="access-tab" onclick="togglePanel()">Accessibility</div>
    <div class="access-panel" id="accessPanel">
        <h3>Accessibility</h3>
        <label>
            <input type="checkbox" id="dyslexicToggle" onclick="toggleDyslexic()">
            Dyslexic-friendly font
        </label>
    </div>
    <!-- acs tab end -->

    <header>
        <a href="index.html"><img class="logo" src="logo.png" alt="Pet Goals logo"></a>
        <img class="text-logo" src="text.png" alt="Pet Goals">
        <div class="header-right">
            <a href="signin.html">Sign In</a>
            <a href="cart.html"><img class="cart-icon" src="thisisacart.png" alt="Shopping cart"></a>
        </div>
    </header>
    <main>
        <h1 style="text-align: center;">Dog Accessories</h1>
        <div class="products">
            <div class="product">
                <img src="misc1.webp" alt="Ruffwear Basecamp dog bowl mat in gray">
                <h3>Basecamp Bowl Mat</h3>
                <p>$24.49</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="misc2.webp" alt="Ruffwear Treat Trader dog treat pouch in brown">
                <h3>Treat Trader Pouch</h3>
                <p>$44.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="misc3.webp" alt="Ruffwear Home Trail hip pack in brown">
                <h3>Home Trail Hip Pack</h3>
                <p>$49.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="misc4.webp" alt="Ruffwear Kibble Kaddie dog food carrier in gray">
                <h3>Kibble Kaddie Carrier</h3>
                <p>$49.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="misc5.webp" alt="Ruffwear Dirtbag dog car seat cover in gray">
                <h3>Dirtbag Car Seat Cover</h3>
                <p>$119.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="misc6.webp" alt="Ruffwear Hitch Hiker dog backpack carrier in gray">
                <h3>Hitch Hiker Backpack</h3>
                <p>$99.99</p>
                <button>Add to Cart</button>
            </div>
        </div>
    </main>
    <footer>
        <p>Our Partners</p>
        <ul class="partners">
            <li><a href="https://www.chewy.com/" target="_blank"><img src="chewy.png" alt="Chewy"></a></li>
            <li><a href="https://www.petsmart.com/" target="_blank"><img src="petsmart.png" alt="PetSmart"></a></li>
            <li><a href="https://www.aspca.org/" target="_blank"><img src="aspca.png" alt="ASPCA"></a></li>
        </ul>
        <p>&copy; 2026 Pet Goals</p>
    </footer>

    <!-- acs tab start -->
    <script>
        function togglePanel() {
            document.getElementById("accessPanel").classList.toggle("open");
        }

        function toggleDyslexic() {
            document.body.classList.toggle("dyslexic");
            localStorage.setItem("dyslexic", document.body.classList.contains("dyslexic"));
        }

        if (localStorage.getItem("dyslexic") === "true") {
            document.body.classList.add("dyslexic");
            document.getElementById("dyslexicToggle").checked = true;
        }
    </script>
    <!-- acs tab end -->

    <script src="script.js"></script>
</body>
</html>
