<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<!-- CSS starts here keep this in mind youll have to edit it later!!! -->
    <style>
    body { font-family: 'Poppins', sans-serif; margin: 0; font-size: 16px; line-height: 1.5; }
    header {
        background-color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 20px;
        position: relative;
    }
    header .logo {
        width: 150px;
    }
    header .text-logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 40px;
    }
    header a {
        color: black;
        text-decoration: none;
        font-size: 20px;
    }
    .products {
        display: flex;
        flex-wrap: wrap;
        text-align: center;
        padding: 20px;
    }
    .product {
        width: 33%;
        padding: 15px;
        box-sizing: border-box;
    }
    .product img {
        width: 60%;
        height: auto;
    }
    .product button {
        background-color: #e0e0e0;
        border: none;
        padding: 10px 20px;
        font-family: 'Poppins', sans-serif;
        font-size: 16px;
        cursor: pointer;
    }
    footer {
        background-color: #e0e0e0;
        text-align: center;
        padding: 10px;
    }
</style>
<!-- CSS ends here -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
