<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<!-- CSS starts here, make sure to keep this place tabbed for when editing is needed as CSS is not my strong suit. -->
    <style>
    body { font-family: 'Poppins', sans-serif; margin: 0; font-size: 16px; line-height: 1.5; }
    header {
        background-color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 20px;
        position: relative;
    }
    header .logo {
        width: 150px;
    }
    header .text-logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 40px;
    }
    header a {
        color: black;
        text-decoration: none;
        font-size: 20px;
    }
    .products {
        display: flex;
        flex-wrap: wrap;
        text-align: center;
        padding: 20px;
    }
    .product {
        width: 33%;
        padding: 15px;
        box-sizing: border-box;
    }
    .product img {
        width: 60%;
        height: auto;
    }
    .product button {
        background-color: #e0e0e0;
        border: none;
        padding: 10px 20px;
        font-family: 'Poppins', sans-serif;
        font-size: 16px;
        cursor: pointer;
    }
    footer {
        background-color: #e0e0e0;
        text-align: center;
        padding: 10px;
    }
    .partners {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 30px;
        padding: 0;
    }
    .partners img {
        height: 40px;
    }
</style>
<!-- CSS ends here -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Goals - Dog Food</title>
</head>
<body>
    <header>
        <a href="index.html"><img class="logo" src="logo.png" alt="Pet Goals logo"></a>
        <img class="text-logo" src="text.png" alt="Pet Goals">
        <a href="signin.html">Sign In</a>
    </header>
    <main>
        <h1 style="text-align: center;">Dog Food</h1>
        <div class="products">
            <div class="product">
                <img src="food 1.png" alt="Hills Science Diet Sensitive Stomach salmon and vegetable dog food can">
                <h3>Sensitive Stomach Salmon</h3>
                <p>$4.49</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="food 2.png" alt="Hills Science Diet Turkey and Barley senior dog food can">
                <h3>Turkey & Barley Adult 7+</h3>
                <p>$3.69</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="food 3.png" alt="Hills Science Diet Turkey and Barley adult dog food can">
                <h3>Turkey & Barley Adult 1-6</h3>
                <p>$3.49</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="food 4.png" alt="Hills Science Diet Savory Stew Beef and Zucchini dog food can">
                <h3>Savory Stew Beef & Zucchini</h3>
                <p>$3.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="food 5.png" alt="Hills Science Diet Sensitive Stomach chicken and vegetable dog food can">
                <h3>Sensitive Stomach Chicken</h3>
                <p>$4.29</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="food 6.png" alt="Hills Science Diet Perfect Weight chicken and vegetable dog food can">
                <h3>Perfect Weight Chicken</h3>
                <p>$4.29</p>
                <button>Add to Cart</button>
            </div>
        </div>
    </main>
    <footer>
        <p>Our Partners</p>
        <ul class="partners">
            <li><a href="https://www.chewy.com/" target="_blank"><img src="chewy.png" alt="Chewy"></a></li>
            <li><a href="https://www.petsmart.com/" target="_blank"><img src="petsmart.png" alt="PetSmart"></a></li>
            <li><a href="https://www.aspca.org/" target="_blank"><img src="aspca.png" alt="ASPCA"></a></li>
        </ul>
        <p>&copy; 2026 Pet Goals</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
