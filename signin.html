<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/opendyslexic@0.0.1/index.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
<!-- CSS starts here keep this in mind for later!!! this is a more complcated script so ill need to go back use this as a marker-->
    <style>
    body { font-family: 'Poppins', sans-serif; margin: 0; font-size: 16px; line-height: 1.5; }
    body.dyslexic, body.dyslexic * { font-family: 'OpenDyslexic', 'Comic Sans MS', sans-serif !important; }
    header {
        background-color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 20px;
        position: relative;
    }
    header .logo {
        width: 150px;
    }
    header .text-logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 40px;
    }
    header a {
        color: black;
        text-decoration: none;
        font-size: 20px;
    }
    .header-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    .cart-icon {
        height: 32px;
        width: auto;
        cursor: pointer;
    }
    .login-box {
        max-width: 400px;
        margin: 50px auto;
        padding: 30px;
        text-align: center;
    }
    .login-box h1 {
        margin-bottom: 20px;
    }
    .login-box label {
        display: block;
        text-align: left;
        margin-bottom: 5px;
        font-weight: bold;
    }
    .login-box input {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        font-family: 'Poppins', sans-serif;
        font-size: 16px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }
    .login-box button {
        background-color: #e0e0e0;
        border: none;
        padding: 12px 40px;
        font-family: 'Poppins', sans-serif;
        font-size: 16px;
        cursor: pointer;
    }
    .message {
        margin-top: 15px;
        font-weight: bold;
    }
    footer {
        background-color: #e0e0e0;
        text-align: center;
        padding: 10px;
    }
    .partners {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 30px;
        padding: 0;
    }
    .partners img {
        height: 40px;
    }

    /* acs tab start */
    .access-tab {
        position: fixed;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        background-color: #444;
        color: white;
        padding: 12px 8px;
        cursor: pointer;
        writing-mode: vertical-rl;
        border-radius: 0 6px 6px 0;
        font-size: 14px;
        z-index: 1000;
    }
    .access-panel {
        position: fixed;
        left: -260px;
        top: 50%;
        transform: translateY(-50%);
        width: 240px;
        background-color: white;
        border: 2px solid #444;
        padding: 20px;
        transition: left 0.3s;
        z-index: 999;
        border-radius: 0 6px 6px 0;
        text-align: center;
    }
    .access-panel.open {
        left: 40px;
    }
    .access-panel h3 {
        margin-top: 0;
    }
    .access-panel label {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        cursor: pointer;
    }
    /* acs tab end */
</style>
<!-- CSS ends here -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Goals - Sign In</title>
</head>
<body>

    <!-- acs tab start -->
    <div class="access-tab" onclick="togglePanel()">Accessibility</div>
    <div class="access-panel" id="accessPanel">
        <h3>Accessibility</h3>
        <label>
            <input type="checkbox" id="dyslexicToggle" onclick="toggleDyslexic()">
            Dyslexic-friendly font
        </label>
    </div>
    <!-- acs tab end -->

    <header>
        <a href="index.html"><img class="logo" src="logo.png" alt="Pet Goals logo"></a>
        <img class="text-logo" src="text.png" alt="Pet Goals">
        <div class="header-right">
            <a href="signin.html">Sign In</a>
            <a href="cart.html"><img class="cart-icon" src="thisisacart.png" alt="Shopping cart"></a>
        </div>
    </header>
    <main>
        <div class="login-box">
            <h1>Pet Goals Dog Store Sign In</h1>
            <p>Demo / Peer Review login: test@petgoals.com / password123</p>

            <!-- DOM (for the checklist), keep in mind the ID's for java later -->
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">

            <!-- DOM: This button calls the login() function in JavaScript when clicked -->
            <button onclick="login()">Sign In</button>

            <!-- DOM (for the checklist) after login -->
            <p class="message" id="message"></p>
        </div>
    </main>
    <footer>
        <p>Our Partners</p>
        <ul class="partners">
            <li><a href="https://www.chewy.com/" target="_blank"><img src="chewy.png" alt="Chewy"></a></li>
            <li><a href="https://www.petsmart.com/" target="_blank"><img src="petsmart.png" alt="PetSmart"></a></li>
            <li><a href="https://www.aspca.org/" target="_blank"><img src="aspca.png" alt="ASPCA"></a></li>
        </ul>
        <p>&copy; 2026 Pet Goals</p>
    </footer>

    <!-- Main DOM starts here for checklist -->
    <script>
        function login() {
            // DOM: finds email box
            var email = document.getElementById("email").value;

            // DOM: finds password box
            var password = document.getElementById("password").value;

            // DOM: getElementById finds the message paragraph so we can update it later
            var message = document.getElementById("message");

            // this checks if the deails put in is right, this is just a dumby account. Had to look up how to do this.
            if (email === "test@petgoals.com" && password === "password123") {
                // DOM updates if someone gets the right info in
                message.style.color = "green";
                message.textContent = "Welcome to Pet Goals!";
            } else {
                // DOM updates if someone gets the wrong info in
                message.style.color = "red";
                message.textContent = "Invalid email or password. Please try again.";
            }
        }
    </script>
    <!-- DOM end -->

    <!-- acs tab start -->
    <script>
        function togglePanel() {
            document.getElementById("accessPanel").classList.toggle("open");
        }

        function toggleDyslexic() {
            document.body.classList.toggle("dyslexic");
            localStorage.setItem("dyslexic", document.body.classList.contains("dyslexic"));
        }

        if (localStorage.getItem("dyslexic") === "true") {
            document.body.classList.add("dyslexic");
            document.getElementById("dyslexicToggle").checked = true;
        }
    </script>
    <!-- acs tab end -->

</body>
</html>
