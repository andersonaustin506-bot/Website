<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<!-- CSS starts here keep this in mind! -->
    <style>
    body { font-family: 'Poppins', sans-serif; margin: 0; }
    header {
        background-color: #e0e0e0;
        display: flex;
        align-items: center;
        padding: 5px 20px;
    }
    header .logo {
        width: 150px;
    }
    header .text-logo {
        margin: 0 auto 0 30px;
        height: 40px;
    }
    header a {
        color: black;
        text-decoration: none;
        font-size: 20px;
    }
    .products {
        display: flex;
        flex-wrap: wrap;
        text-align: center;
        padding: 20px;
    }
    .product {
        width: 33%;
        padding: 15px;
        box-sizing: border-box;
    }
    .product img {
        width: 60%;
        height: auto;
    }
    .product button {
        background-color: #e0e0e0;
        border: none;
        padding: 10px 20px;
        font-family: 'Poppins', sans-serif;
        font-size: 16px;
        cursor: pointer;
    }
</style>
<!-- CSS ends here! T5 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Goals - Dog Treats</title>
</head>
<body>
    <header>
        <a href="index.html"><img class="logo" src="logo.png" alt="Pet Goals logo"></a>
        <img class="text-logo" src="text.png" alt="Pet Goals">
        <a href="signin.html">Sign In</a>
    </header>
    <main>
        <h1 style="text-align: center;">Dog Treats</h1>
        <div class="products">
            <div class="product">
                <img src="treat1.webp" alt="Milk Bone large dog biscuits box">
                <h3>Milk-Bone Large Biscuits</h3>
                <p>$12.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="treat2.webp" alt="Pawstruck 6 inch bully sticks bag">
                <h3>Pawstruck Bully Sticks</h3>
                <p>$18.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="treat3.webp" alt="Pawstruck filled bones variety pack">
                <h3>Pawstruck Filled Bones</h3>
                <p>$15.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="treat4.webp" alt="Pawstruck natural dental chews bag">
                <h3>Pawstruck Dental Chews</h3>
                <p>$14.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="treat5.webp" alt="Pawstruck collagen wrapped jerky braids bag">
                <h3>Collagen Jerky Braids</h3>
                <p>$16.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="treat6.webp" alt="Pawstruck collagen wrapped jerky rings bag">
                <h3>Collagen Jerky Rings</h3>
                <p>$16.99</p>
                <button>Add to Cart</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Pet Goals</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
